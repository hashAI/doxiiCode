<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store · Contemporary Collection</title>
    <meta name="description" content="A Lit + Tailwind ecommerce template for modern apparel brands.">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ink: {
                            50: '#f8fafc',
                            100: '#eef2ff',
                            200: '#e0e7ff',
                            400: '#94a3b8',
                            500: '#64748b',
                            700: '#0f172a',
                            900: '#020617'
                        },
                        sand: {
                            100: '#fef3c7',
                            200: '#fde68a',
                            400: '#fbbf24',
                            600: '#d97706'
                        },
                        blush: {
                            100: '#ffe4e6',
                            400: '#fb7185',
                            500: '#f43f5e'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Playfair Display', 'serif']
                    },
                    boxShadow: {
                        glow: '0 25px 50px -12px rgba(15,23,42,0.25)'
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <style>
        :root {
            --header-height: 4.25rem;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #ffffff;
        }

        .gradient-border {
            background-image: linear-gradient(120deg, rgba(15,23,42,0.1), rgba(244,63,94,0.15));
        }
    </style>
</head>
<body class="bg-white text-ink-700 dark:bg-ink-900 dark:text-white antialiased">
    <site-header></site-header>
    <main id="app" class="min-h-screen"></main>
    <site-footer></site-footer>
    <cart-drawer></cart-drawer>
    <location-selector></location-selector>
    <favorites-sidebar></favorites-sidebar>
    <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-3 z-50"></div>
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script type="module" src="./assets/app.js?v=1"></script>
</body>
</html>
