<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store · Premium Products</title>
    <meta name="description" content="Premium marketplace built with Lit + Tailwind. Browse products, save favorites, and discover your perfect items.">
    <meta name="theme-color" content="#2D0B52">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script>
        (() => {
            const savedTheme = localStorage.getItem('store-theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');

            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }

            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.setAttribute('content', theme === 'dark' ? '#0B0B16' : '#2D0B52');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#F4EAFD',
                            100: '#E4D3FA',
                            200: '#C8A7F5',
                            300: '#A97BF0',
                            400: '#8B4DEA',
                            500: '#6C20E4',
                            600: '#5517B7',
                            700: '#3E0F89',
                            800: '#2D0B52',
                            900: '#1B0833'
                        },
                        accent: {
                            50: '#FFE5ED',
                            100: '#FFB8CD',
                            200: '#FF8BAB',
                            300: '#FF5D89',
                            400: '#FF3067',
                            500: '#F2104D',
                            600: '#C40C3C',
                            700: '#96092E',
                            800: '#68061F',
                            900: '#3A0311'
                        },
                        stone: {
                            950: '#0B0B16'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'mobile': '0 -2px 14px rgba(0,0,0,0.08)',
                        'card': '0 8px 24px rgba(18,10,38,0.08)',
                        'bottom': '0 -8px 24px rgba(0,0,0,0.16)'
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <style>
        :root {
            --header-height: 4.2rem;
            --header-height-desktop: 5rem;
            --bottom-nav-height: 4.5rem;
            --sidebar-width: 280px;
            --max-content-width: 1440px;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: #0f001b;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            transition: background-color 0.3s ease;
        }

        /* Glam animations */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(236, 72, 153, 0.3); }
            50% { box-shadow: 0 0 40px rgba(236, 72, 153, 0.5); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .dark body {
            background: #0B0B16;
        }

        /* Desktop scrollbar styling */
        @media (min-width: 1024px) {
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: rgba(0,0,0,0.1);
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(108, 32, 228, 0.3);
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(108, 32, 228, 0.5);
            }
        }

        /* Hide scrollbar on mobile */
        @media (max-width: 1023px) {
            ::-webkit-scrollbar {
                width: 0px;
                background: transparent;
            }
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Mobile-first animations */
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        /* Touch feedback */
        .touch-feedback:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }

        /* Desktop hover effects */
        @media (min-width: 1024px) {
            .desktop-hover:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 40px rgba(45, 11, 82, 0.15);
            }
            .desktop-hover {
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
        }

        /* Hide scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Bottom sheet - mobile only */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .dark .bottom-sheet {
            background: #11162a;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 12px auto;
        }

        .dark .bottom-sheet-handle {
            background: #4B5563;
        }

        /* Desktop modal - converts bottom sheet to centered modal on desktop */
        @media (min-width: 1024px) {
            .bottom-sheet {
                position: fixed;
                top: 50%;
                left: 50%;
                bottom: auto;
                right: auto;
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0;
                max-width: 480px;
                width: 90%;
                border-radius: 24px;
                max-height: 80vh;
                overflow-y: auto;
            }
            .bottom-sheet.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            .bottom-sheet-handle {
                display: none;
            }
        }

        /* Desktop dropdown menu */
        .desktop-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
            z-index: 100;
            min-width: 220px;
        }

        .desktop-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dark .desktop-dropdown {
            background: #1f2937;
        }

        /* Container utilities for desktop */
        .container-desktop {
            max-width: var(--max-content-width);
            margin: 0 auto;
            padding: 0 1rem;
        }

        @media (min-width: 1024px) {
            .container-desktop {
                padding: 0 2rem;
            }
        }

        @media (min-width: 1280px) {
            .container-desktop {
                padding: 0 3rem;
            }
        }
    </style>
</head>
<body class="bg-[#0f001b] dark:bg-stone-950 text-gray-900 dark:text-gray-100 antialiased">
    <app-header></app-header>
    <main id="app" class="min-h-screen pb-24 lg:pb-8"></main>
    <bottom-nav></bottom-nav>
    <cart-sidebar></cart-sidebar>
    <favorites-sidebar></favorites-sidebar>
    <location-selector></location-selector>
    <div id="toast-container" class="fixed top-4 right-4 flex flex-col gap-3 z-50"></div>
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
