<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero AI Geometric - Demo (Light & Dark Mode + Mobile Menu)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            backdrop-filter: blur(10px);
        }
        .control-panel button {
            width: 100%;
            padding: 10px 20px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .control-panel button:hover {
            transform: scale(1.05);
        }
        .btn-dark {
            background: #1e293b;
            color: white;
        }
        .btn-light {
            background: #f1f5f9;
            color: #1e293b;
        }
        .btn-toggle {
            background: #6366f1;
            color: white;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3 style="margin: 0 0 15px 0; font-size: 16px;">🎨 Theme Controls</h3>
        <button class="btn-dark" onclick="setDarkMode()">🌙 Dark Mode</button>
        <button class="btn-light" onclick="setLightMode()">☀️ Light Mode</button>
        <button class="btn-toggle" onclick="toggleTheme()">🔄 Toggle Theme</button>
        <button class="btn-toggle" onclick="openMobileMenu()">📱 Open Mobile Menu</button>
        <div class="status">
            <strong>Current Theme:</strong> <span id="current-theme">Dark</span><br>
            <strong>Mobile Menu:</strong> <span id="menu-status">Closed</span>
        </div>
    </div>

    <hero-ai-geometric id="hero"></hero-ai-geometric>

    <script type="module">
        import './hero-ai-geometric.js';

        const component = document.querySelector('hero-ai-geometric');
        const themeDisplay = document.getElementById('current-theme');
        const menuStatusDisplay = document.getElementById('menu-status');

        // Global functions for controls
        window.setDarkMode = () => {
            component.theme = 'dark';
            updateThemeDisplay();
        };

        window.setLightMode = () => {
            component.theme = 'light';
            updateThemeDisplay();
        };

        window.toggleTheme = () => {
            component.toggleTheme();
            updateThemeDisplay();
        };

        window.openMobileMenu = () => {
            component.toggleMobileMenu();
        };

        function updateThemeDisplay() {
            themeDisplay.textContent = component.theme === 'dark' ? 'Dark 🌙' : 'Light ☀️';
        }

        // Event listeners
        component.addEventListener('nav-click', (e) => {
            console.log('🔗 Navigation clicked:', e.detail);
            alert(`Navigating to: ${e.detail.item.label}`);
        });

        component.addEventListener('cta-primary-click', (e) => {
            console.log('🎯 Primary CTA clicked:', e.detail);
            alert('🚀 Getting started!');
        });

        component.addEventListener('cta-secondary-click', (e) => {
            console.log('🎬 Secondary CTA clicked:', e.detail);
            alert('▶️ Opening demo video...');
        });

        component.addEventListener('menu-toggle', (e) => {
            console.log('📱 Menu toggled:', e.detail);
            menuStatusDisplay.textContent = e.detail.open ? 'Open ✅' : 'Closed ❌';
        });

        component.addEventListener('theme-changed', (e) => {
            console.log('🎨 Theme changed to:', e.detail.theme);
            updateThemeDisplay();
        });

        // Initialize display
        updateThemeDisplay();
    </script>
</body>
</html>
