<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Gradient Ecommerce - Test</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; padding: 20px; background: #f0f0f0; margin: 0;">
        Hero Gradient Ecommerce Component Test
    </h1>

    <div style="padding: 20px; background: #e0e0e0; text-align: center;">
        <button id="toggle-theme" style="padding: 10px 20px; background: #4F39F6; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Toggle Theme (Current: Light)
        </button>
        <p style="margin-top: 10px; font-size: 14px; color: #666;">
            Click the button above to toggle between light and dark themes
        </p>
    </div>

    <!-- Light Mode Component -->
    <hero-gradient-ecommerce id="hero-component" theme="light"></hero-gradient-ecommerce>

    <!-- Import Component -->
    <script type="module">
        import './hero-gradient-ecommerce.js';

        const component = document.getElementById('hero-component');
        const toggleBtn = document.getElementById('toggle-theme');

        // Toggle theme
        toggleBtn.addEventListener('click', () => {
            const currentTheme = component.theme;
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            component.theme = newTheme;
            toggleBtn.textContent = `Toggle Theme (Current: ${newTheme.charAt(0).toUpperCase() + newTheme.slice(1)})`;
        });

        // Event listeners
        component.addEventListener('nav-click', (e) => {
            console.log('Navigation clicked:', e.detail);
            alert(`Navigation: ${e.detail.item.label}`);
        });

        component.addEventListener('cta-primary-click', (e) => {
            console.log('Primary CTA clicked:', e.detail);
            alert('Starting free trial! 🚀');
        });

        component.addEventListener('cta-secondary-click', (e) => {
            console.log('Secondary CTA clicked:', e.detail);
            alert(`Action: ${e.detail.action}`);
        });

        component.addEventListener('menu-toggle', (e) => {
            console.log('Mobile menu toggled:', e.detail);
        });

        component.addEventListener('theme-changed', (e) => {
            console.log('Theme changed to:', e.detail.theme);
            toggleBtn.textContent = `Toggle Theme (Current: ${e.detail.theme.charAt(0).toUpperCase() + e.detail.theme.slice(1)})`;
        });

        // Initialize Lucide icons
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
