<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store · Products for Everyone</title>
    <meta name="description" content="Shop products with free home trial & personalized recommendations!">
    <meta name="theme-color" content="#0A1628">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='10' cy='16' r='6' fill='none' stroke='%2300BAB5' stroke-width='2'/%3E%3Ccircle cx='22' cy='16' r='6' fill='none' stroke='%2300BAB5' stroke-width='2'/%3E%3Cpath d='M16 16h0' stroke='%2300BAB5' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">

    <script>
        (() => {
            const savedTheme = localStorage.getItem('store-theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.setAttribute('content', theme === 'dark' ? '#0F172A' : '#0A1628');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#E6FAFA',
                            100: '#B3F0F0',
                            200: '#80E6E6',
                            300: '#4DDBDB',
                            400: '#26D4D4',
                            500: '#00BAB5',
                            600: '#00A3A0',
                            700: '#008C8A',
                            800: '#007574',
                            900: '#005E5D'
                        },
                        navy: {
                            50: '#E8EDF5',
                            100: '#C5D1E5',
                            200: '#9FB3D4',
                            300: '#7995C3',
                            400: '#5C7FB6',
                            500: '#3F69A9',
                            600: '#32558C',
                            700: '#26416F',
                            800: '#1A2D52',
                            900: '#0A1628'
                        },
                        gold: {
                            50: '#FFFBEB',
                            100: '#FEF3C7',
                            200: '#FDE68A',
                            300: '#FCD34D',
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                            700: '#B45309',
                            800: '#92400E',
                            900: '#78350F'
                        }
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'glow': '0 0 40px rgba(0, 186, 181, 0.15)',
                        'card': '0 4px 20px rgba(0,0,0,0.08)',
                        'card-hover': '0 8px 30px rgba(0,0,0,0.12)',
                        'bottom': '0 -4px 20px rgba(0,0,0,0.08)',
                        'nav': '0 2px 20px rgba(0,0,0,0.06)'
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        }
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <style>
        :root {
            --header-height: 64px;
            --header-height-desktop: 140px;
            --bottom-nav-height: 72px;
        }

        @media (min-width: 1024px) {
            :root {
                --header-height: var(--header-height-desktop);
            }
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #FAFBFC;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            transition: background-color 0.3s ease;
        }

        .dark body {
            background: #0F172A;
        }

        /* Custom scrollbar for desktop */
        @media (min-width: 1024px) {
            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: #f1f5f9;
            }
            .dark ::-webkit-scrollbar-track {
                background: #1e293b;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            .dark ::-webkit-scrollbar-thumb {
                background: #475569;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }
        }

        /* Hide scrollbar on mobile */
        @media (max-width: 1023px) {
            ::-webkit-scrollbar {
                width: 0px;
                background: transparent;
            }
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .slide-up { animation: slideUp 0.3s ease-out; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .slide-in-left { animation: slideInLeft 0.3s ease-out; }
        .slide-in-right { animation: slideInRight 0.3s ease-out; }
        .scale-in { animation: scaleIn 0.2s ease-out; }

        /* Touch feedback */
        .touch-feedback {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .touch-feedback:active {
            transform: scale(0.97);
        }
        @media (min-width: 1024px) {
            .touch-feedback:hover {
                transform: translateY(-2px);
            }
        }

        /* Hide scrollbar */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Bottom sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }
        .dark .bottom-sheet { background: #1E293B; }
        .bottom-sheet.open { transform: translateY(0); }
        .bottom-sheet-handle {
            width: 48px;
            height: 5px;
            background: #E2E8F0;
            border-radius: 3px;
            margin: 12px auto;
        }
        .dark .bottom-sheet-handle { background: #475569; }

        /* Desktop modal */
        @media (min-width: 1024px) {
            .bottom-sheet {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0;
                bottom: auto;
                right: auto;
                max-width: 480px;
                width: 90%;
                border-radius: 24px;
                max-height: 80vh;
                pointer-events: none;
            }
            .bottom-sheet.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                pointer-events: auto;
            }
            .bottom-sheet-handle { display: none; }
        }

        /* Side drawer */
        .side-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 85%;
            max-width: 360px;
            background: white;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            overflow-y: auto;
            box-shadow: 10px 0 40px rgba(0,0,0,0.15);
        }
        .dark .side-drawer { background: #1E293B; }
        .side-drawer.open { transform: translateX(0); }

        /* WhatsApp floating button */
        .whatsapp-float {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(37,211,102,0.4);
            z-index: 50;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .whatsapp-float:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 28px rgba(37,211,102,0.5);
        }
        .whatsapp-float:active { transform: scale(0.95); }

        @media (min-width: 1024px) {
            .whatsapp-float { bottom: 40px; right: 40px; }
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #00BAB5 0%, #0A1628 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
        }

        /* Shimmer effect */
        .shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* Product card hover */
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        @media (min-width: 1024px) {
            .product-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            }
        }

        /* Category card */
        .category-card {
            position: relative;
            overflow: hidden;
        }
        .category-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,22,40,0.8) 0%, transparent 60%);
            pointer-events: none;
        }
        .category-card img {
            transition: transform 0.5s ease;
        }
        .category-card:hover img {
            transform: scale(1.08);
        }

        /* Desktop container */
        .container-desktop {
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }
        @media (min-width: 1280px) {
            .container-desktop {
                padding-left: 48px;
                padding-right: 48px;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 antialiased">

    <side-menu></side-menu>
    <main id="app" class="min-h-screen"></main>
    <app-footer></app-footer>
    <bottom-nav></bottom-nav>
    <cart-sidebar></cart-sidebar>
    <location-selector></location-selector>
    <favorites-sidebar></favorites-sidebar>

    <!-- WhatsApp Floating Button -->
    <div id="whatsapp-float" class="whatsapp-float">
        <i data-lucide="message-circle" class="text-white w-7 h-7"></i>
    </div>

    <div id="toast-container" class="fixed top-20 lg:top-6 right-4 lg:right-6 flex flex-col gap-3 z-[200]"></div>
    <div id="overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40 transition-opacity"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
