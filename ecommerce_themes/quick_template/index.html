<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store · Luxury Collection</title>
    <meta name="description" content="A curated atelier of contemporary fine products. Experience luxury through a gallery lens.">
    <meta name="theme-color" content="#0A0A0A">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        noir: {
                            50: '#f5f5f5',
                            100: '#e5e5e5',
                            200: '#cccccc',
                            300: '#999999',
                            400: '#666666',
                            500: '#444444',
                            600: '#2a2a2a',
                            700: '#1a1a1a',
                            800: '#111111',
                            900: '#0a0a0a',
                            950: '#050505'
                        },
                        gold: {
                            50: '#FBF7EF',
                            100: '#F5ECDB',
                            200: '#EBD9B7',
                            300: '#DFC393',
                            400: '#D4AF37',
                            500: '#C9A962',
                            600: '#B8944D',
                            700: '#967639',
                            800: '#6B5429',
                            900: '#403219'
                        }
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        sans: ['Libre Franklin', 'system-ui', 'sans-serif']
                    },
                    letterSpacing: {
                        'ultrawide': '0.25em',
                        'megawide': '0.4em'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'scale-in': 'scaleIn 0.4s ease-out forwards',
                        'reveal': 'reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' }
                        },
                        reveal: {
                            '0%': { clipPath: 'inset(0 100% 0 0)' },
                            '100%': { clipPath: 'inset(0 0% 0 0)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(212,175,55,0.3)' },
                            '50%': { boxShadow: '0 0 40px rgba(212,175,55,0.5)' }
                        }
                    }
                }
            }
        };
    </script>

    <style>
        :root {
            --header-height: 5rem;
            --action-bar-height: 4.5rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        ::selection {
            background: rgba(212, 175, 55, 0.3);
            color: #fff;
        }

        body {
            font-family: 'Libre Franklin', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        /* Grain texture overlay */
        .grain::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            z-index: 9999;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar - minimal gold line */
        ::-webkit-scrollbar {
            width: 2px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.5);
        }

        /* Hide scrollbar on mobile */
        @media (max-width: 1023px) {
            ::-webkit-scrollbar {
                display: none;
            }
            body {
                scrollbar-width: none;
            }
        }

        /* Editorial line */
        .line-gold {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.6), transparent);
        }

        /* Text gradient */
        .text-gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #C9A962 50%, #B8944D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glass effect - dark version */
        .glass-dark {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Hover underline animation */
        .hover-line {
            position: relative;
        }
        .hover-line::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #D4AF37;
            transition: width 0.3s ease;
        }
        .hover-line:hover::after {
            width: 100%;
        }

        /* Image reveal on hover */
        .img-reveal {
            overflow: hidden;
        }
        .img-reveal img {
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-reveal:hover img {
            transform: scale(1.05);
        }

        /* Stagger animation delays */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }

        /* Touch feedback */
        .touch-scale:active {
            transform: scale(0.97);
            transition: transform 0.1s;
        }

        /* Focus states */
        button:focus-visible, a:focus-visible {
            outline: 1px solid rgba(212, 175, 55, 0.5);
            outline-offset: 2px;
        }

        /* Scrollbar hide utility */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Line clamp utilities */
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Aspect ratios */
        .aspect-portrait {
            aspect-ratio: 3/4;
        }
        .aspect-editorial {
            aspect-ratio: 4/5;
        }

        /* Border fade */
        .border-fade-b {
            border-image: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.2), transparent) 1;
        }

        /* Full screen overlay base */
        .full-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.98);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .full-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Modal center base */
        .modal-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            z-index: 110;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-center.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        /* Action bar glass */
        .action-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        /* Product card minimal */
        .product-card {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (min-width: 1024px) {
            .product-card:hover {
                transform: translateY(-8px);
            }
        }

        /* Category filter orb */
        .filter-orb {
            position: fixed;
            right: 1.5rem;
            bottom: 6rem;
            z-index: 45;
        }

        /* Quick view panel */
        .quick-view-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 85vh;
            z-index: 100;
            background: #111;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .quick-view-panel.open {
            transform: translateY(0);
        }
        @media (min-width: 1024px) {
            .quick-view-panel {
                top: 50%;
                bottom: auto;
                left: 50%;
                right: auto;
                max-height: 90vh;
                max-width: 600px;
                width: 90%;
                border-radius: 0;
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0;
            }
            .quick-view-panel.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body class="bg-noir-900 text-noir-100 antialiased grain">
    <!-- Minimal Header -->
    <gallery-header></gallery-header>

    <!-- Main Content -->
    <main id="app" class="min-h-screen"></main>

    <!-- Floating Action Bar (Mobile) -->
    <floating-actions></floating-actions>

    <!-- Full-screen Menu Overlay -->
    <immersive-menu></immersive-menu>

    <!-- Collection Cart Modal -->
    <shopping-cart></shopping-cart>

    <!-- Private Collection (Wishlist) Gallery -->
    <private-collection></private-collection>

    <!-- Filter Panel -->
    <filter-panel></filter-panel>

    <!-- Quick View Modal -->
    <quick-view></quick-view>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 flex flex-col gap-3 z-[200]"></div>

    <!-- Overlay for modals -->
    <div id="overlay" class="fixed inset-0 bg-noir-950/80 backdrop-blur-sm hidden z-40 transition-all duration-300"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
