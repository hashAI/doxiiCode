<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickCart · Everything Store</title>
    <meta name="description" content="QuickCart - Your everything store for groceries, electronics, daily essentials & more. Delivered in minutes!">
    <meta name="theme-color" content="#EC407A">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script>
        (() => {
            const savedTheme = localStorage.getItem('quickcart-theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');

            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }

            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.setAttribute('content', theme === 'dark' ? '#1F2937' : '#EC407A');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#FCE4EC',
                            100: '#F8BBD0',
                            200: '#F48FB1',
                            300: '#F06292',
                            400: '#EC407A',
                            500: '#E91E63',
                            600: '#D81B60',
                            700: '#C2185B',
                            800: '#AD1457',
                            900: '#880E4F'
                        },
                        purple: {
                            50: '#F3E5F5',
                            100: '#E1BEE7',
                            200: '#CE93D8',
                            300: '#BA68C8',
                            400: '#AB47BC',
                            500: '#9C27B0',
                            600: '#8E24AA',
                            700: '#7B1FA2',
                            800: '#6A1B9A',
                            900: '#4A148C'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'mobile': '0 -2px 10px rgba(0,0,0,0.05)',
                        'card': '0 2px 8px rgba(0,0,0,0.08)',
                        'bottom': '0 -4px 12px rgba(0,0,0,0.1)'
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <style>
        :root {
            --header-height: 3.5rem;
            --bottom-nav-height: 4rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #ffffff;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            transition: background-color 0.3s ease;
        }

        .dark body {
            background: #111827;
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Mobile-first animations */
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        /* Touch feedback */
        .touch-feedback:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }

        /* Hide scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Bottom sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .dark .bottom-sheet {
            background: #1F2937;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 12px auto;
        }

        .dark .bottom-sheet-handle {
            background: #4B5563;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased">
    <app-header></app-header>
    <main id="app" class="min-h-screen pb-20"></main>
    <bottom-nav></bottom-nav>
    <cart-sidebar></cart-sidebar>
    <location-selector></location-selector>
    <favorites-sidebar></favorites-sidebar>
    <div id="toast-container" class="fixed top-4 right-4 flex flex-col gap-3 z-50"></div>
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
